services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      SERPER_API_KEY: ${SERPER_API_KEY}
    volumes:
      - tasks_data:/tmp/tasks_data
    restart: unless-stopped

volumes:
  tasks_data:

